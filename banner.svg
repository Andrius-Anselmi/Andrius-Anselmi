<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<style>
  @media (prefers-color-scheme: dark) {
    .bg  { fill: #0d1117; }
    .el  { stroke: #58a6ff22; }
    .em  { stroke: #58a6ff44; }
    .eh  { stroke: #58a6ff77; }
    .nd  { fill: #0d1117; stroke: #30363d; }
    .nm  { fill: #0d1117; stroke: #388bfd; }
    .nh  { fill: #0d1117; stroke: #58a6ff; }
    .dd  { fill: #21262d; }
    .dm  { fill: #388bfd; }
    .dh  { fill: #79c0ff; }
    .gl  { fill: #388bfd12; }
  }
  @media (prefers-color-scheme: light) {
    .bg  { fill: #ffffff; }
    .el  { stroke: #0969da12; }
    .em  { stroke: #0969da30; }
    .eh  { stroke: #0969da55; }
    .nd  { fill: #ffffff; stroke: #d0d7de; }
    .nm  { fill: #ffffff; stroke: #0550ae; }
    .nh  { fill: #ffffff; stroke: #0969da; }
    .dd  { fill: #d0d7de; }
    .dm  { fill: #0550ae; }
    .dh  { fill: #0969da; }
    .gl  { fill: #0969da0a; }
  }
</style>

